<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Holistic Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #333333; 
            --card-bg: #222222;
            --border-color: #444444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-yellow: #facc15;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-family); min-height: 100vh; overflow-x: hidden; }

        /* Navbar & Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 1px solid var(--border-color); background-color: var(--card-bg); }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-title { font-size: 1.2rem; font-weight: bold; color: var(--accent-yellow); display: flex; align-items: center; gap: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .badge { background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .badge.yellow { color: var(--accent-yellow); }
        .badge.green { color: var(--accent-green); }

        /* Tabs */
        .nav-tabs { display: flex; gap: 30px; padding: 0 30px; border-bottom: 1px solid var(--border-color); background-color: var(--card-bg); }
        .nav-item { padding: 15px 0; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; transition: 0.3s; }
        .nav-item:hover { color: var(--text-main); }
        .nav-item.active { color: var(--accent-yellow); border-bottom: 2px solid var(--accent-yellow); }

        /* Containers */
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; display: none; }
        .container.active { display: block; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save { background: var(--accent-blue); color: white; }
        .btn-close { background: var(--border-color); color: white; }
        input, select { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; }

        /* --- Dashboard Counters --- */
        .counters-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .counter-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; text-align: center; }
        .counter-title { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .counter-controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .counter-btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .counter-btn:hover { background: #555; }
        .counter-val { font-size: 1.8rem; font-weight: bold; color: var(--accent-yellow); min-width: 40px; }

        /* Dashboard Metrics Grid */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .metric-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; }
        .metric-title { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .metric-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
        .val-yellow { color: var(--accent-yellow); } .val-blue { color: var(--accent-blue); } .val-purple { color: var(--accent-purple); } .val-green { color: var(--accent-green); } .val-red { color: var(--accent-red); }
        .charts-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .chart-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; }
        .canvas-container { position: relative; height: 250px; width: 100%; display: flex; justify-content: center; align-items: center; }

        /* --- Syllabus Tracker Styles --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .subject-nav-horizontal { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .subj-btn-hz { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px 25px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .subj-btn-hz:hover { border-color: #555; color: var(--text-main); }
        .subj-btn-hz.active { border-color: var(--accent-blue); color: var(--text-main); background-color: rgba(59, 130, 246, 0.1); }
        .subj-percent-badge { background: var(--bg-color); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: normal; color: var(--text-muted); }
        .subj-btn-hz.active .subj-percent-badge { color: var(--accent-blue); border: 1px solid rgba(59, 130, 246, 0.3); }

        .syllabus-horizontal-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; height: 45vh; }
        .main-topic-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; min-width: 380px; max-width: 380px; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
        .main-topic-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .mtc-header { padding: 18px; border-bottom: 1px solid var(--border-color); background: #282828; border-radius: 10px 10px 0 0; display: flex; flex-direction: column; gap: 5px; }
