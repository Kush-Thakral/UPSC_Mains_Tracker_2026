<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroPrep Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --border-color: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-yellow: #facc15;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-family); min-height: 100vh; }

        /* Navbar & Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 1px solid var(--border-color); background-color: #0b0f19; }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-title { font-size: 1.2rem; font-weight: bold; color: var(--accent-yellow); display: flex; align-items: center; gap: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .badge { background-color: var(--card-bg); border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .badge.yellow { color: var(--accent-yellow); }
        .badge.green { color: var(--accent-green); }

        /* Tabs */
        .nav-tabs { display: flex; gap: 30px; padding: 0 30px; border-bottom: 1px solid var(--border-color); background-color: #0b0f19; }
        .nav-item { padding: 15px 0; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--accent-yellow); border-bottom: 2px solid var(--accent-yellow); }

        /* Containers */
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; display: none; }
        .container.active { display: block; }

        /* Dashboard Styles */
        .hero-banner { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .hero-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .hero-subtitle { color: var(--text-muted); font-size: 0.9rem; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .metric-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; }
        .metric-title { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .metric-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
        .metric-sub { color: var(--text-muted); font-size: 0.8rem; }
        .val-yellow { color: var(--accent-yellow); } .val-blue { color: var(--accent-blue); } .val-purple { color: var(--accent-purple); } .val-green { color: var(--accent-green); }
        .charts-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .chart-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; }
        .chart-header { font-size: 1rem; font-weight: bold; margin-bottom: 20px; }
        .canvas-container { position: relative; height: 250px; width: 100%; display: flex; justify-content: center; align-items: center; }

        /* Syllabus Tracker Styles */
        .syllabus-layout { display: flex; gap: 20px; height: 75vh; }
        .subject-sidebar { width: 250px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 10px; }
        
        /* Custom Scrollbar for Sidebar and Table */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        .subject-btn { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-muted); padding: 15px; border-radius: 8px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .subject-btn:hover { border-color: #374151; }
        .subject-btn.active { border-color: var(--accent-blue); color: var(--text-main); background-color: rgba(59, 130, 246, 0.1); }
        .subject-content { flex: 1; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #1f2937; color: var(--text-muted); padding: 15px; font-size: 0.85rem; font-weight: normal; text-transform: uppercase; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: rgba(255, 255, 255, 0.02); }
        
        .main-topic { font-weight: bold; color: var(--accent-blue); font-size: 0.85rem; margin-bottom: 4px; display: block; }
        
        /* Checkbox styling */
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-green); }
        .status-done { color: var(--accent-green); text-decoration: line-through; opacity: 0.6; }

    </style>
</head>

                { main: "Linear Programming", sub: "Duality", status: false },
                { main: "Linear Programming", sub: "Transportation and assignment problems.", status: false },
                { main: "PDE", sub: "Family of surfaces in three dimensions and formulation of partial differential equations", status: false },
                { main: "PDE", sub: "Solution of quasilinear partial differential equations of the first order, Cauchy’s method of characteristics", status: false },
                { main: "PDE", sub: "Linear partial differential equations of the second order with constant coefficients, canonical form", status: false },
                { main: "PDE", sub: "Equation of a vibrating string, heat equation, Laplace equation and their solutions.", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Numerical methods: solution of algebraic and transcendental equations of one variable by bisection, Regula-Falsi and Newton-Raphson methods", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Solution of system of linear equations by Gaussian elimination and Gauss-Jordan (direct), Gauss-Seidel(iterative) methods", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Newton’s (forward and backward) interpolation, Lagrange’s interpolation", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Numerical integration: Trapezoidal rule, Simpson’s rules, Gaussian quadrature formula", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Numerical solution of ordinary differential equations: Euler and Runge Kutta-methods", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Computer Programming: Binary system", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Arithmetic and logical operations on numbers", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Octal and Hexadecimal systems", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Conversion to and from decimal systems", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Algebra of binary numbers", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Elements of computer systems and concept of memory", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Basic logic gates and truth tables, Boolean algebra, normal forms", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Representation of unsigned integers, signed integers and reals, double precision reals and long integers", status: false },
                { main: "Numerical Analysis and Computer Programming", sub: "Algorithms and flow charts for solving numerical analysis problems.", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Generalised coordinates", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "D’Alembert’s principle and Lagrange’s equations", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Hamilton equations", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Moment of inertia", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Motion of rigid bodies in two dimensions", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Equation of continuity", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Euler’s equation of motion for inviscid flow", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Stream-lines, path of a particle", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Potential flow", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Two-dimensional and axisymmetric motion", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Sources and sinks, vortex motion", status: false },
                { main: "Mechanics and Fluid dynamics", sub: "Navier-Stokes equation for a viscous fluid.", status: false }
            ]
        };

        // Load saved data from localStorage, or use default
        let appData = JSON.parse(localStorage.getItem('microprep_data_full')) || defaultData;
        let currentSubject = "Maths P2"; // Default open tab
        let doughnutChartInst = null;
        let barChartInst = null;

        // Set Date
        const dateOptions = { day: 'numeric', month: 'short', year: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', dateOptions);

        // ==========================================
        // 2. CORE LOGIC
        // ==========================================

        function calculateStats() {
            let total = 0;
            let completed = 0;
            let subjectStats = {};

            for (const [subj, topics] of Object.entries(appData)) {
                let subjTotal = topics.length;
                let subjDone = topics.filter(t => t.status).length;
                
                total += subjTotal;
                completed += subjDone;
                
                subjectStats[subj] = {
                    total: subjTotal,
                    done: subjDone,
                    percent: subjTotal > 0 ? Math.round((subjDone / subjTotal) * 100) : 0
                };
            }
            
            const overallPercent = total > 0 ? ((completed / total) * 100).toFixed(1) : 0;
            return { total, completed, overallPercent, subjectStats };
        }

        function switchTab(viewId) {
            // Update Top Nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');

            // Switch Containers
            document.getElementById('view-dashboard').classList.remove('active');
            document.getElementById('view-syllabus').classList.remove('active');
            document.getElementById('view-' + viewId).classList.add('active');

            if (viewId === 'dashboard') renderDashboard();
            if (viewId === 'syllabus') renderSyllabusSidebar();
        }

        // ==========================================
        // 3. DASHBOARD RENDERING
        // ==========================================
        function renderDashboard() {
            const stats = calculateStats();
            document.getElementById('top-topic-count').textContent = `📚 ${stats.completed} / ${stats.total} topics`;

            // Render Metrics
            const metrics = [
                { title: "Syllabus Done", value: `${stats.overallPercent}%`, sub: "overall completion", color: "val-yellow" },
                { title: "Mastered", value: stats.completed, sub: `of ${stats.total} topics`, color: "val-green" },
                { title: "Remaining", value: stats.total - stats.completed, sub: "topics to go", color: "val-blue" },
                { title: "Study Hours", value: "12.0", sub: "logged (from CSV)", color: "val-purple" }
            ];

            const mc = document.getElementById('metrics-container');
            mc.innerHTML = metrics.map(m => `
                <div class="metric-card">
                    <div class="metric-title">${m.title}</div>
                    <div class="metric-value ${m.color}">${m.value}</div>
                    <div class="metric-sub">${m.sub}</div>
                </div>
            `).join('');

            updateCharts(stats);
        }

        function updateCharts(stats) {
            Chart.defaults.color = '#9ca3af';
            Chart.defaults.borderColor = '#1f2937';

            // Doughnut
            const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');
            if(doughnutChartInst) doughnutChartInst.destroy();
            doughnutChartInst = new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Remaining'],
                    datasets: [{
                        data: [stats.completed, stats.total - stats.completed],
                        backgroundColor: ['#22c55e', '#1f2937'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });

            // Bar Chart
            const labels = Object.keys(stats.subjectStats);
            const data = labels.map(l => stats.subjectStats[l].percent);
            const ctxBar = document.getElementById('barChart').getContext('2d');
            
            if(barChartInst) barChartInst.destroy();
            barChartInst = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '% Completed',
                        data: data,
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // ==========================================
        // 4. SYLLABUS RENDERING
        // ==========================================
        function renderSyllabusSidebar() {
            const stats = calculateStats();
            const sidebar = document.getElementById('subject-sidebar');
            sidebar.innerHTML = Object.keys(appData).map(subj => `
                <div class="subject-btn ${subj === currentSubject ? 'active' : ''}" onclick="selectSubject('${subj}')">
                    <span>${subj}</span>
                    <span style="font-size: 0.8rem; opacity: 0.7;">${stats.subjectStats[subj].percent}%</span>
                </div>
            `).join('');
            
            renderSyllabusTable();
        }

        function selectSubject(subj) {
            currentSubject = subj;
            renderSyllabusSidebar(); // re-render to update active state
        }

        function renderSyllabusTable() {
            const tbody = document.getElementById('syllabus-table-body');
            const topics = appData[currentSubject];

            tbody.innerHTML = topics.map((t, index) => `
                <tr>
                    <td>
                        <input type="checkbox" ${t.status ? 'checked' : ''} onchange="toggleTopic('${currentSubject}', ${index})">
                    </td>
                    <td>
                        <span class="main-topic">${t.main}</span>
                        <span class="${t.status ? 'status-done' : ''}">${t.sub}</span>
                    </td>
                </tr>
            `).join('');
        }

        function toggleTopic(subject, index) {
            // Update the data array
            appData[subject][index].status = !appData[subject][index].status;
            
            // Save to browser cache so it persists on refresh
            localStorage.setItem('microprep_data_full', JSON.stringify(appData));
            
            // Re-render
            renderSyllabusTable();
            renderSyllabusSidebar(); // Update the sidebar percentages live
            
            // Update top count instantly
            const stats = calculateStats();
            document.getElementById('top-topic-count').textContent = `📚 ${stats.completed} / ${stats.total} topics`;
        }

        // Initialize App
        renderDashboard();

    </script>
</body>
